name: nullclaw
base: core24
adopt-info: nullclaw
title: NullClaw
summary: Lightweight local-first autonomous AI assistant
description: |
  NullClaw is a lightweight, local-first autonomous AI assistant — a static
  binary that boots in milliseconds with no runtime dependencies beyond libc.
  It connects to locally-running AI model servers (Lemonade, Ollama) and
  exposes a gateway for chat channels (Telegram, Discord, Signal, web UI)
  and agentic tasks such as file operations, code execution, and scheduled
  jobs.

  On first launch the service automatically detects running Lemonade and
  Ollama instances and configures them as providers, with Lemonade as the
  preferred default.  No cloud account or API key is required.

  Run 'nullclaw.inference-snap' to pick a Canonical inference snap
  (gemma4, gemma3, deepseek-r1, and others) as the primary provider.

  Run the interactive setup wizard at any time:

    nullclaw onboard

  The background gateway service starts automatically the first time you run
  any nullclaw command and is managed as a standard systemd user unit:

    systemctl --user status nullclaw
    systemctl --user stop nullclaw

  SECURITY NOTE

  This tool is capable of executing code, accessing files, and interacting
  with external services on your behalf. Due to the nature of autonomous
  AI agents, we recommend installing and running this snap inside an LXD
  container as best practice. A container provides an extra layer of
  confinement, limiting the agent's reach to the container environment
  and reducing exposure to your host system and personal data.

    lxc launch ubuntu:24.04 my-agent
    lxc exec my-agent -- snap install --classic nullclaw

source-code: https://github.com/kenvandine/nullclaw-snap
issues: https://github.com/kenvandine/nullclaw-snap/issues
contact: https://github.com/kenvandine/nullclaw-snap/issues
website: https://nullclaw.io
license: MIT

grade: stable
confinement: classic

apps:
  # Interactive CLI — onboarding wizard, config editing, status checks, etc.
  nullclaw:
    command: bin/nullclaw-launch

  # Interactive Lemonade model picker.  Run as: nullclaw.lemonade
  lemonade:
    command: bin/nullclaw-lemonade
    environment:
      CLAW_CLI_NAME: nullclaw

  # Interactive inference snap picker.  Run as: nullclaw.inference-snap
  inference-snap:
    command: bin/nullclaw-inference-snap
    environment:
      CLAW_CLI_NAME: nullclaw
      CLAW_INFERENCE_SNAPS: "gemma3 gemma4 deepseek-r1 nemotron-3-nano nemotron-3-nano-omni qwen-vl"

  # Web chat UI — run as: nullclaw.ui
  # Serves the bundled nullclaw-chat-ui at http://127.0.0.1:4173.
  # Connects to the nullclaw WebSocket gateway at ws://127.0.0.1:3000/ws.
  # Pass --port <port> to use a different port.
  ui:
    command: bin/nullclaw-ui-launch

  # Gateway daemon — registered as /snap/bin/nullclaw.daemon so the snap
  # wrapper sets up $SNAP and friends before exec-ing the launch script.
  # Managed by the systemd user unit installed on first run of 'nullclaw'.
  daemon:
    command: bin/nullclaw-daemon-launch

parts:
  launcher:
    plugin: dump
    source: snap/local
    organize:
      bin/nullclaw-launch: bin/nullclaw-launch
      bin/nullclaw-daemon-launch: bin/nullclaw-daemon-launch
      bin/nullclaw-lemonade: bin/nullclaw-lemonade
      bin/nullclaw-inference-snap: bin/nullclaw-inference-snap
      bin/nullclaw-ui-launch: bin/nullclaw-ui-launch
      bin/setup-providers: bin/setup-providers
      share/systemd/user/nullclaw.service: share/systemd/user/nullclaw.service

  nullclaw:
    plugin: nil
    override-pull: |
      # Fetch the latest release tag from GitHub.
      VERSION=$(curl -fsSL \
        "https://api.github.com/repos/nullclaw/nullclaw/releases/latest" \
        | grep '"tag_name"' | head -1 \
        | sed 's/.*"tag_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/')
      if [ -z "$VERSION" ]; then
        echo "nullclaw: failed to determine latest release version" >&2
        exit 1
      fi
      craftctl set version="${VERSION#v}"

      case "$CRAFT_ARCH_BUILD_FOR" in
        amd64)   ARCH="x86_64" ;;
        arm64)   ARCH="aarch64" ;;
        armhf)   ARCH="arm32-gnu" ;;
        riscv64) ARCH="riscv64" ;;
        *) echo "nullclaw: unsupported architecture: $CRAFT_ARCH_BUILD_FOR" >&2; exit 1 ;;
      esac

      BINARY="nullclaw-linux-${ARCH}.bin"
      echo "nullclaw: downloading ${BINARY} (${VERSION})"
      curl -fsSL \
        "https://github.com/nullclaw/nullclaw/releases/download/${VERSION}/${BINARY}" \
        -o "$CRAFT_PART_SRC/nullclaw"
      chmod +x "$CRAFT_PART_SRC/nullclaw"
    override-build: |
      install -Dm755 "$CRAFT_PART_SRC/nullclaw" "$CRAFT_PART_INSTALL/bin/nullclaw"
    build-packages:
      - curl
    stage-packages:
      - curl

  # Bundles Node.js so nullclaw.ui can serve the chat-ui without depending
  # on the host having node installed (classic confinement, but still cleaner).
  node:
    plugin: npm
    source: .
    npm-include-node: true
    npm-node-version: '22.16.0'
    override-build: |
      craftctl default

  # Downloads the latest nullclaw-chat-ui release and stages the pre-built
  # static site plus the pure-Node.js server script into the snap.
  nullclaw-chat-ui:
    plugin: nil
    override-pull: |
      VERSION=$(curl -fsSL \
        "https://api.github.com/repos/nullclaw/nullclaw-chat-ui/releases/latest" \
        | grep '"tag_name"' | head -1 \
        | sed 's/.*"tag_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/')
      if [ -z "$VERSION" ]; then
        echo "nullclaw-chat-ui: failed to determine latest release version" >&2
        exit 1
      fi
      TARBALL="nullclaw-chat-ui-${VERSION}.tar.gz"
      echo "nullclaw-chat-ui: downloading ${TARBALL} (${VERSION})"
      curl -fsSL \
        "https://github.com/nullclaw/nullclaw-chat-ui/releases/download/${VERSION}/${TARBALL}" \
        -o "$CRAFT_PART_SRC/${TARBALL}"
      tar -xzf "$CRAFT_PART_SRC/${TARBALL}" -C "$CRAFT_PART_SRC"
    override-build: |
      install -d "$CRAFT_PART_INSTALL/share/nullclaw-chat-ui"
      cp -r "$CRAFT_PART_SRC/nullclaw-chat-ui/build" \
            "$CRAFT_PART_INSTALL/share/nullclaw-chat-ui/"
      cp -r "$CRAFT_PART_SRC/nullclaw-chat-ui/bin" \
            "$CRAFT_PART_INSTALL/share/nullclaw-chat-ui/"
      cp "$CRAFT_PART_SRC/nullclaw-chat-ui/package.json" \
         "$CRAFT_PART_INSTALL/share/nullclaw-chat-ui/"
    build-packages:
      - curl
