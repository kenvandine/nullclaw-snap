name: PR smoke test

on:
  pull_request:
    paths:
      - 'snap/**'

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up snapd
        uses: snapcore/prepare-env-gh-action@latest
        with:
          channel: 8.x/stable

      - name: Install snapcraft
        run: sudo snap install snapcraft --channel=8.x/stable --classic

      - name: Build snap
        run: snapcraft pack

      - name: Install snap
        run: |
          SNAP_FILE=$(ls -t nullclaw_*.snap | head -1)
          if [ -z "$SNAP_FILE" ]; then
            echo "No snap file found"
            exit 1
          fi
          echo "Installing $SNAP_FILE"
          sudo snap install --dangerous "$SNAP_FILE" --classic
          snap wait system seed.loaded
          sleep 5

      - name: Test nullclaw CLI
        run: |
          nullclaw --version 2>&1 || true
          nullclaw --help 2>&1 | head -20 || true

      - name: Test daemon command
        run: |
          nullclaw.daemon --help 2>&1 | head -20 || true

      - name: Test lemonade command
        run: |
          # No lemonade-server in CI, so this exits non-zero with a friendly
          # "not detected" message; we only assert the app runs without crashing.
          nullclaw.lemonade </dev/null 2>&1 | head -20 || true
